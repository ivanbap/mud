<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Módulo 01 | MUD 40+</title>
    <style>
        .bg-brand { background-color: #481C1E; }
        .text-brand { color: #481C1E; }
        .border-brand { border-color: #481C1E; }
        
        /* Estilo para a aula selecionada na lista */
        .aula-item.active { 
            background-color: #481C1E !important; 
            color: white !important; 
            border-color: #481C1E;
        }
        .aula-item.active p { color: white !important; }
        .aula-item.active .tempo { color: rgba(255,255,255,0.7) !important; }

        /* Container do vídeo mantendo proporção 16:9 sem cortes */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Scrollbar personalizada para a lista de aulas */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #481C1E; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white shadow-sm border-b border-gray-200 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="../curso.html" class="text-brand font-bold text-lg flex items-center hover:opacity-80 transition">
                <span class="mr-2">←</span> Voltar ao Menu
            </a>
            <h1 class="font-bold text-brand italic uppercase tracking-wider">Módulo 01: Mentalidade</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-3">
                <div class="video-container">
                    <iframe 
                        id="video-player"
                        src="https://www.youtube.com/embed/ejUBhujqdHg?rel=0&modestbranding=1" 
                        title="Player de Vídeo"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="mt-6">
                    <h2 id="video-title" class="text-2xl font-bold text-gray-900">1. Boas vindas ao Método</h2>
                    <p class="text-gray-500 mt-1">Módulo 01 • Aula Atual</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:h-[75vh] flex flex-col">
                <h3 class="text-lg font-bold text-brand mb-4 border-b pb-4">Aulas do Módulo</h3>
                
                <div class="space-y-3 overflow-y-auto custom-scroll pr-2" id="lista-aulas">
                    <div onclick="trocarVideo('ejUBhujqdHg', this)" class="aula-item active cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-transparent">
                        <p class="font-bold text-sm">1. Boas vindas ao Método</p>
                        <p class="tempo text-xs text-gray-500 mt-1">10:00</p>
                    </div>

                    <div onclick="trocarVideo('EKageUgZdUk', this)" class="aula-item cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-transparent">
                        <p class="font-bold text-sm">2. Como usar os materiais</p>
                        <p class="tempo text-xs text-gray-500 mt-1">05:30</p>
                    </div>

                    <div onclick="trocarVideo('ID_AQUI', this)" class="aula-item cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-transparent">
                        <p class="font-bold text-sm">3. Mentalidade Blindada</p>
                        <p class="tempo text-xs text-gray-500 mt-1">12:15</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function trocarVideo(videoId, element) {
            const iframe = document.getElementById('video-player');
            
            // Alterando o src mantendo os parâmetros de "limpeza" do YT
            // Autoplay=1 faz o vídeo começar assim que o aluno clica na aula
            iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&autoplay=1`;

            // Atualiza o título na tela
            const novoTitulo = element.querySelector('p').innerText;
            document.getElementById('video-title').innerText = novoTitulo;

            // Gerencia a classe 'active' para destacar a aula atual
            document.querySelectorAll('.aula-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // Scroll suave para o topo no mobile ao trocar de aula
            if (window.innerWidth < 1024) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
