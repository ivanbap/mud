<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Módulo 01 | MUD 40+</title>
    <style>
        .bg-brand { background-color: #481C1E; }
        .text-brand { color: #481C1E; }
        .border-brand { border-color: #481C1E; }
        /* Estilo para a aula selecionada na lista */
        .aula-item.active { background-color: #481C1E !important; color: white !important; }
        .aula-item.active p { color: white !important; opacity: 0.8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white shadow-sm border-b border-gray-200 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="../curso.html" class="text-brand font-bold text-lg flex items-center">
                <span class="mr-2">←</span> Voltar ao Menu
            </a>
            <h1 class="font-bold text-brand italic uppercase">Módulo 01: Mentalidade</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-8 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-3">
                <div class="bg-black rounded-2xl overflow-hidden shadow-2xl aspect-video relative">
                    <div style="position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 15px; overflow: hidden; shadow: 0 10px 25px rgba(0,0,0,0.2);">
                        <iframe 
                            src="https://www.youtube.com/embed/ejUBhujqdHg?rel=0&modestbranding=1&showinfo=0" 
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
                <h2 id="video-title" class="text-2xl font-bold text-gray-900 mt-4">Selecione uma aula</h2>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:h-[70vh] overflow-y-auto">
                <h3 class="text-lg font-bold text-brand mb-6">Conteúdos</h3>
                
                <div class="space-y-4">
                    <div onclick="trocarVideo('ID_DO_VIDEO_1', this)" class="aula-item cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-gray-100">
                        <p class="font-bold text-sm text-gray-800">1. Boas vindas ao Método</p>
                        <p class="text-xs text-gray-500 mt-1">10 min</p>
                    </div>

                    <div onclick="trocarVideo('ID_DO_VIDEO_2', this)" class="aula-item cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-gray-100">
                        <p class="font-bold text-sm text-gray-800">2. Como usar os materiais</p>
                        <p class="text-xs text-gray-500 mt-1">5 min</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function trocarVideo(videoId, element) {
            // 1. Muda o vídeo no iframe
            const iframe = document.getElementById('video-player');
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

            // 2. Muda o título (opcional, pode criar um array de títulos)
            document.getElementById('video-title').innerText = element.querySelector('p').innerText;

            // 3. Destaca o item clicado na lista
            document.querySelectorAll('.aula-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        // Carregar o primeiro vídeo automaticamente
        document.addEventListener('DOMContentLoaded', () => {
            const primeiroVideo = document.querySelector('.aula-item');
            if (primeiroVideo) primeiroVideo.click();
        });
    </script>
</body>
</html>
