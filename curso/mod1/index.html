<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Módulo 01 | MUD 40+</title>
    <style>
        .bg-brand { background-color: #481C1E; }
        .text-brand { color: #481C1E; }
        .border-brand { border-color: #481C1E; }
        
        .aula-item.active { 
            background-color: #481C1E !important; 
            color: white !important; 
            border-color: #481C1E;
        }
        .aula-item.active p { color: white !important; }
        .aula-item.active .tempo { color: rgba(255,255,255,0.7) !important; }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px; /* Reduzi um pouco para mobile */
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        @media (min-width: 1024px) {
            .video-container { border-radius: 16px; }
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Scrollbar personalizada */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #481C1E; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="bg-white shadow-sm border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="../curso.html" class="text-brand font-bold text-sm md:text-lg flex items-center hover:opacity-80 transition">
                <span class="mr-2">←</span> <span class="hidden md:inline">Voltar ao Menu</span><span class="md:hidden">Voltar</span>
            </a>
            <h1 class="font-bold text-brand italic uppercase tracking-wider text-xs md:text-base">Módulo 01: Mentalidade</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-4 md:py-8 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 md:gap-8">
            
            <div class="lg:col-span-3">
                <div class="video-container">
                    <iframe 
                        id="video-player"
                        src="https://www.youtube.com/embed/ejUBhujqdHg?rel=0&modestbranding=1" 
                        title="Player de Vídeo"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="mt-4 md:mt-6">
                    <h2 id="video-title" class="text-xl md:text-2xl font-bold text-gray-900 leading-tight">1. Boas vindas ao Método</h2>
                    <p class="text-sm text-gray-500 mt-1">Módulo 01 • Aula Atual</p>
                </div>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-fit lg:h-[75vh]">
                <h3 class="text-base md:text-lg font-bold text-brand mb-4 border-b pb-3">Aulas do Módulo</h3>
                
                <div class="space-y-3 overflow-y-auto custom-scroll pr-1 max-h-[400px] lg:max-h-full" id="lista-aulas">
                    
                    <div onclick="trocarVideo('ejUBhujqdHg', this)" class="aula-item active cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-transparent">
                        <p class="font-bold text-sm">1. Boas vindas ao Método</p>
                        <p class="tempo text-xs text-gray-500 mt-1">10:00</p>
                    </div>

                    <div onclick="trocarVideo('EKageUgZdUk', this)" class="aula-item cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-transparent">
                        <p class="font-bold text-sm">2. Como usar os materiais</p>
                        <p class="tempo text-xs text-gray-500 mt-1">05:30</p>
                    </div>

                    <div onclick="trocarVideo('ID_AQUI', this)" class="aula-item cursor-pointer p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition border border-transparent">
                        <p class="font-bold text-sm">3. Mentalidade Blindada</p>
                        <p class="tempo text-xs text-gray-500 mt-1">12:15</p>
                    </div>
                    
                </div>
            </div>
        </div>
    </main>

    <script>
        function trocarVideo(videoId, element) {
            const iframe = document.getElementById('video-player');
            
            // Autoplay=1 ajuda na fluidez após o primeiro clique do usuário
            iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&autoplay=1`;

            const novoTitulo = element.querySelector('p').innerText;
            document.getElementById('video-title').innerText = novoTitulo;

            document.querySelectorAll('.aula-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // No mobile, após trocar o vídeo, volta suavemente para o player
            if (window.innerWidth < 1024) {
                const videoPos = document.querySelector('.video-container').offsetTop;
                window.scrollTo({ top: videoPos - 100, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
